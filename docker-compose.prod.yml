# Продакшен (VPS + Traefik). Одна команда:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Перед запуском:
#   1. config.docker.yml — secret, database.password
#   2. Host + PathPrefix `/game` ниже — как yacheboksarov.ru/game
#   3. database.password = POSTGRES_PASSWORD ниже (по умолчанию postgres)
#   4. Сеть traefik — имя external network, как у вашего Traefik

services:
  postgres:
    image: postgres:18
    container_name: guess_the_flag_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: guess_the_flag
    volumes:
      - postgres_data_guess_the_flag:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guess_the_flag"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app_network

  migrate:
    image: ghcr.io/kukymbr/goose-docker:3.24.1
    container_name: guess_the_flag_migrate
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: host=postgres port=5432 user=postgres password=postgres dbname=guess_the_flag sslmode=disable
      GOOSE_MIGRATION_DIR: /migrations
    volumes:
      - ./backend/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: "no"

  backend:
    image: guess_the_flag_backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guess_the_flag_backend
    restart: unless-stopped
    volumes:
      - ./config.docker.yml:/app/config.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: "/game"
        REACT_APP_BASE_PATH: "/game"
        PUBLIC_URL: "/game"
        NGINX_CONFIG: nginx.prod.conf
    container_name: guess_the_flag_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app_network
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik
      - traefik.http.routers.guess-the-flag.rule=Host(`yacheboksarov.ru`) && PathPrefix(`/game`)
      - traefik.http.routers.guess-the-flag.priority=100
      - traefik.http.routers.guess-the-flag.entrypoints=websecure
      - traefik.http.routers.guess-the-flag.tls=true
      - traefik.http.routers.guess-the-flag.tls.certresolver=letsencrypt
      - traefik.http.services.guess-the-flag.loadbalancer.server.port=80

volumes:
  postgres_data_guess_the_flag:

networks:
  app_network:
    driver: bridge
  traefik:
    external: true
    name: traefik
