# Copy to project root: cp deploy/config.prod.yml.example config.prod.yml
# database.password must match POSTGRES_PASSWORD in .env

addr: 0.0.0.0:8080
secret: change_me_jwt_secret_min_32_chars
token_lifetime: 24h
logging_level: info
database:
  host: postgres
  port: 5432
  username: postgres
  password: change_me_strong_password
  dbname: guess_the_flag
  max_idle_connections: 2
  max_open_connections: 100
  max_connection_lifetime: 60m
